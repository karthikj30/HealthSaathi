<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Sign in to HealthSaathi — your personal patient pre-consultation assistant." />
    <title>HealthSaathi — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>

    <!-- Floating particles -->
    <div class="particles" aria-hidden="true" id="particlesContainer"></div>

    <main class="login-shell">

      <!-- Feature chips above the card -->
      <div class="feature-chips">
        <span class="chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Secure &amp; Private
        </span>
        <span class="chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Doctor-Ready Reports
        </span>
        <span class="chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
          Voice Input
        </span>
      </div>

      <section class="login-card" role="main">
        <!-- Brand lockup -->
        <div class="brand-lockup">
          <div class="brand-icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
          </div>
          <div class="brand-text">
            <p class="eyebrow">Secure Access</p>
            <h1>HealthSaathi</h1>
          </div>
        </div>

        <p class="subtitle">Sign in to create and share your doctor-ready consultation summary.</p>

        <form id="loginForm" class="login-form" novalidate>
          <!-- Success / info banner -->
          <p id="loginInfo" class="success" aria-live="polite" role="status">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span id="loginInfoText"></span>
          </p>

          <!-- Role selection as pill toggle -->
          <div>
            <span style="font-size:0.84rem;font-weight:700;color:#2d4a45;display:block;margin-bottom:0.5rem;">Sign in as</span>
            <div class="role-toggle" role="group" aria-label="Account role">
              <div class="role-option">
                <input type="radio" name="role" id="rolePatient" value="patient" checked />
                <label for="rolePatient">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
                  Patient
                </label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="roleDoctor" value="doctor" />
                <label for="roleDoctor">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
                  Doctor
                </label>
              </div>
            </div>
          </div>

          <!-- Email -->
          <label for="email">
            Email address
            <div class="input-wrap">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input id="email" type="email" name="email" required placeholder="you@example.com" autocomplete="email" />
            </div>
          </label>

          <!-- Password -->
          <label for="password">
            Password
            <div class="input-wrap">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input id="password" type="password" name="password" required placeholder="Enter your password" autocomplete="current-password" />
              <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show/hide password">
                <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </label>

          <!-- Submit -->
          <button type="submit" class="primary" id="loginBtn">
            <span class="btn-text">Sign In</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>

          <!-- Error message -->
          <p id="loginError" class="error" aria-live="polite" role="alert"></p>
        </form>

        <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up here</a></p>
      </section>
    </main>

    <script src="auth.js"></script>

    <script>
      // ——— Particles ———
      (function () {
        const container = document.getElementById('particlesContainer');
        for (let i = 0; i < 18; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const size = Math.random() * 10 + 4;
          const left = Math.random() * 100;
          const delay = Math.random() * 14;
          const duration = Math.random() * 10 + 12;
          Object.assign(p.style, {
            width: size + 'px', height: size + 'px',
            left: left + '%',
            animationDelay: delay + 's',
            animationDuration: duration + 's',
            opacity: Math.random() * 0.4 + 0.1,
          });
          container.appendChild(p);
        }
      })();

      // ——— Service worker cleanup ———
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
      }

      // ——— Auth redirect ———
      if (window.HealthSaathiAuth?.isAuthenticated()) {
        window.location.href = window.HealthSaathiAuth.getDashboardPathByRole();
      }

      const loginForm   = document.getElementById('loginForm');
      const loginError  = document.getElementById('loginError');
      const loginInfo   = document.getElementById('loginInfo');
      const loginInfoText = document.getElementById('loginInfoText');
      const loginBtn    = document.getElementById('loginBtn');
      const pwInput     = document.getElementById('password');
      const eyeIcon     = document.getElementById('eyeIcon');

      // Registered success message
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('registered') === '1') {
        loginInfoText.textContent = 'Account created! Please sign in to continue.';
        loginInfo.classList.add('show');
      }

      // Password visibility toggle
      document.getElementById('passwordToggle').addEventListener('click', () => {
        const visible = pwInput.type === 'text';
        pwInput.type = visible ? 'password' : 'text';
        eyeIcon.innerHTML = visible
          ? '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'
          : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      });

      // Form submit
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.textContent = '';
        loginInfo.classList.remove('show');

        const email    = document.getElementById('email').value.trim();
        const password = pwInput.value;
        const role     = document.querySelector('input[name="role"]:checked').value;

        loginBtn.classList.add('loading');
        loginBtn.disabled = true;

        const result = await window.HealthSaathiAuth.login(email, password, role);

        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;

        if (!result.ok) {
          loginError.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ' +
            (result.error || 'Login failed. Check email/password and try again.');
          return;
        }

        loginInfoText.textContent = 'Login successful — redirecting…';
        loginInfo.classList.add('show');
        setTimeout(() => {
          window.location.href = window.HealthSaathiAuth.getDashboardPathByRole(result.user?.role);
        }, 900);
      });
    </script>
  </body>
</html>
