<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Create your HealthSaathi account and start preparing for consultations." />
    <title>HealthSaathi — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
    <style>
      /* Signup-specific: password strength indicator */
      .strength-bar {
        margin-top: 0.45rem;
        height: 4px;
        border-radius: 2px;
        background: #e0ecea;
        overflow: hidden;
        transition: all 0.3s ease;
      }
      .strength-fill {
        height: 100%;
        border-radius: 2px;
        width: 0%;
        transition: width 0.4s ease, background 0.4s ease;
      }
      .strength-label {
        font-size: 0.74rem;
        font-weight: 700;
        margin-top: 0.25rem;
        color: #888;
        transition: color 0.3s ease;
      }
      /* Match confirm field */
      .input-match {
        position: absolute;
        right: 0.85rem;
        color: #14b89e;
        display: none;
      }
      .input-match.show { display: block; }
    </style>
  </head>
  <body>

    <!-- Floating particles -->
    <div class="particles" aria-hidden="true" id="particlesContainer"></div>

    <main class="login-shell">

      <!-- Feature chips above the card -->
      <div class="feature-chips">
        <span class="chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Free Forever
        </span>
        <span class="chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Family Sharing
        </span>
        <span class="chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
          AI-Powered
        </span>
      </div>

      <section class="login-card" role="main">
        <!-- Brand lockup -->
        <div class="brand-lockup">
          <div class="brand-icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
          </div>
          <div class="brand-text">
            <p class="eyebrow">Create Account</p>
            <h1>Join HealthSaathi</h1>
          </div>
        </div>

        <p class="subtitle">Start preparing for consultations smarter — track symptoms, generate reports, and connect with your doctor.</p>

        <form id="signupForm" class="login-form" novalidate>

          <!-- Role selection as pill toggle -->
          <div>
            <span style="font-size:0.84rem;font-weight:700;color:#2d4a45;display:block;margin-bottom:0.5rem;">I am a</span>
            <div class="role-toggle" role="group" aria-label="Account type">
              <div class="role-option">
                <input type="radio" name="role" id="rolePatient" value="patient" checked />
                <label for="rolePatient">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
                  Patient
                </label>
              </div>
              <div class="role-option">
                <input type="radio" name="role" id="roleDoctor" value="doctor" />
                <label for="roleDoctor">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
                  Doctor
                </label>
              </div>
            </div>
          </div>

          <!-- Email -->
          <label for="email">
            Email address
            <div class="input-wrap">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input id="email" type="email" name="email" required placeholder="you@example.com" autocomplete="email" />
            </div>
          </label>

          <!-- Password + strength -->
          <label for="password">
            Password
            <div class="input-wrap">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input id="password" type="password" name="password" required placeholder="Create a strong password" autocomplete="new-password" />
              <button type="button" class="password-toggle" id="passwordToggle1" aria-label="Show/hide password">
                <svg id="eyeIcon1" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel">Enter a password</span>
          </label>

          <!-- Confirm Password -->
          <label for="confirmPassword">
            Confirm password
            <div class="input-wrap">
              <svg class="input-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <input id="confirmPassword" type="password" name="confirmPassword" required placeholder="Re-enter your password" autocomplete="new-password" />
              <svg class="input-match" id="matchIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </label>

          <!-- Submit -->
          <button type="submit" class="primary" id="signupBtn">
            <span class="btn-text">Create Account</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>

          <!-- Error -->
          <p id="signupError" class="error" aria-live="polite" role="alert"></p>
        </form>

        <p class="auth-footer">Already have an account? <a href="login.html">Sign in here</a></p>
      </section>
    </main>

    <script src="auth.js"></script>

    <script>
      // ——— Particles ———
      (function () {
        const container = document.getElementById('particlesContainer');
        for (let i = 0; i < 18; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const size = Math.random() * 10 + 4;
          Object.assign(p.style, {
            width: size + 'px', height: size + 'px',
            left: Math.random() * 100 + '%',
            animationDelay: Math.random() * 14 + 's',
            animationDuration: Math.random() * 10 + 12 + 's',
            opacity: Math.random() * 0.4 + 0.1,
          });
          container.appendChild(p);
        }
      })();

      // ——— Service worker cleanup ———
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
      }

      // Clear existing session for signup
      if (window.HealthSaathiAuth?.isAuthenticated()) {
        ['healthsaathi_auth','healthsaathi_user','healthsaathi_role'].forEach(k => localStorage.removeItem(k));
      }

      const signupForm   = document.getElementById('signupForm');
      const signupError  = document.getElementById('signupError');
      const signupBtn    = document.getElementById('signupBtn');
      const pwInput      = document.getElementById('password');
      const confirmInput = document.getElementById('confirmPassword');
      const strengthFill = document.getElementById('strengthFill');
      const strengthLabel= document.getElementById('strengthLabel');
      const matchIcon    = document.getElementById('matchIcon');

      // Password visibility
      document.getElementById('passwordToggle1').addEventListener('click', () => {
        const v = pwInput.type === 'text';
        pwInput.type = v ? 'password' : 'text';
        document.getElementById('eyeIcon1').innerHTML = v
          ? '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'
          : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      });

      // Password strength
      pwInput.addEventListener('input', () => {
        const v = pwInput.value;
        let score = 0;
        if (v.length >= 8) score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        const pct   = [0,25,50,75,100][score];
        const clr   = ['#ccc','#ff5e6c','#f59e0b','#3b82f6','#14b89e'][score];
        const label = ['Enter a password','Too weak','Getting there','Almost strong','Strong ✓'][score];
        strengthFill.style.width = pct + '%';
        strengthFill.style.background = clr;
        strengthLabel.textContent = label;
        strengthLabel.style.color = clr;
        checkMatch();
      });

      // Confirm match
      function checkMatch() {
        if (confirmInput.value && confirmInput.value === pwInput.value) {
          matchIcon.classList.add('show');
          confirmInput.style.borderColor = '#14b89e';
        } else {
          matchIcon.classList.remove('show');
          confirmInput.style.borderColor = '';
        }
      }
      confirmInput.addEventListener('input', checkMatch);

      // Form submit
      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        signupError.textContent = '';

        const email    = document.getElementById('email').value.trim();
        const password = pwInput.value;
        const confirm  = confirmInput.value;
        const role     = document.querySelector('input[name="role"]:checked').value;

        if (password !== confirm) {
          signupError.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Passwords do not match.';
          return;
        }
        if (password.length < 6) {
          signupError.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Password must be at least 6 characters.';
          return;
        }
        if (!window.HealthSaathiAuth || typeof window.HealthSaathiAuth.register !== 'function') {
          signupError.textContent = 'Service unavailable. Please refresh and try again.';
          return;
        }

        signupBtn.classList.add('loading');
        signupBtn.disabled = true;

        const response = await window.HealthSaathiAuth.register(email, password, role);

        signupBtn.classList.remove('loading');
        signupBtn.disabled = false;

        if (!response.ok) {
          const msg = (response.error && response.error.toLowerCase().includes('email already'))
            ? 'Email already registered. <a href="login.html" style="color:inherit;font-weight:800;">Sign in instead.</a>'
            : (response.error || 'Signup failed. Please try again.');
          signupError.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ' + msg;
          return;
        }

        window.location.href = 'login.html?registered=1';
      });
    </script>
  </body>
</html>
